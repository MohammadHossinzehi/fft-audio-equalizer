<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>From-Scratch FFT Spectrum Analyzer & Equalizer</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  :root { color-scheme: dark; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #0f1115;
    color: #e6e6e6;
    padding: 24px;
  }
  h1 { font-size: 1.25rem; font-weight: 600; margin-bottom: 4px; }
  p.sub { color: #9aa0a6; margin-top: 0; margin-bottom: 20px; }
  .controls { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-bottom: 16px; }
  button, input[type=file] {
    background: #1c1f26; color: #e6e6e6; border: 1px solid #333844;
    border-radius: 6px; padding: 8px 14px; cursor: pointer; font-size: 0.9rem;
  }
  button:hover { background: #262a33; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  canvas { width: 100%; height: 320px; background: #05070a; border-radius: 8px; display: block; }
  .bands { display: flex; gap: 18px; margin-top: 18px; flex-wrap: wrap; }
  .band { display: flex; flex-direction: column; align-items: center; width: 90px; }
  .band label { font-size: 0.75rem; color: #9aa0a6; margin-bottom: 6px; text-align: center; }
  .band input[type=range] { writing-mode: vertical-lr; direction: rtl; height: 120px; }
  .band output { font-size: 0.75rem; margin-top: 6px; }
  .status { font-size: 0.8rem; color: #9aa0a6; margin-top: 10px; min-height: 1.2em; }
</style>
</head>
<body>
  <h1>From-Scratch FFT Spectrum Analyzer &amp; Equalizer</h1>
  <p class="sub">
    Every number on this page comes from a hand-written radix-2 FFT and
    RBJ biquad filters &mdash; no AnalyserNode, no BiquadFilterNode.
  </p>

  <div class="controls">
    <button id="micBtn">Use microphone</button>
    <label for="fileInput" style="display:contents">
      <input type="file" id="fileInput" accept="audio/*" />
    </label>
    <button id="stopBtn" disabled>Stop</button>
  </div>

  <canvas id="spectrum" width="1200" height="320"></canvas>

  <div class="bands" id="bands"></div>
  <div class="status" id="status"></div>

  <script type="module" src="./app.js"></script>
</body>
</html>
